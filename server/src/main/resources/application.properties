server.port=3001
spring.application.name=witshop-api

spring.datasource.url=jdbc:h2:file:./data/witshop;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

witshop.jwt.secret=${JWT_SECRET:witshop-dev-secret-key-minimum-32-chars!!}
witshop.jwt.expiration-days=7
