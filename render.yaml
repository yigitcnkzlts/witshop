services:
  - type: web
    name: witshop-api
    runtime: java
    rootDir: server
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/witshop-api-*.jar
    healthCheckPath: /health
    envVars:
      - key: JAVA_VERSION
        value: "21"
      - key: JWT_SECRET
        generateValue: true
