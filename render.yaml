services:
  - type: web
    name: witshop-api
    runtime: java
    rootDir: server
    buildCommand: mvn -DskipTests package
    startCommand: java -jar target/witshop-api-1.0.0.jar
    healthCheckPath: /health
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: JWT_SECRET
        generateValue: true
